name: Package Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão (tag) ex.: v0.0.1"
        required: true
        type: string
      tag_repository:
        description: "Criar e enviar tag?"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Publicar Release?"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        if: matrix.os == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Sync extension version with release tag
        shell: bash
        run: |
          RAW_VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${RAW_VERSION#v}"
          node -e "
            const fs = require('fs');
            const version = process.argv[1];

            const pkgPath = 'extension/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

            // npm ci valida que package-lock.json bate com package.json -- sem isto aqui, ci falha
            // com 'package.json and package-lock.json ... are in sync' assim que a versao muda.
            const lockPath = 'extension/package-lock.json';
            const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
            lock.version = version;
            if (lock.packages && lock.packages[''] ) lock.packages[''].version = version;
            fs.writeFileSync(lockPath, JSON.stringify(lock, null, 2) + '\n');

            console.log('extension version set to', version);
          " "$VERSION"

      - name: Install extension dependencies
        run: npm --prefix extension ci

      - name: Compile extension
        run: npm --prefix extension run compile

      - name: Build core
        run: node scripts/build-core.js --clean --config Release

      - name: Build devices
        run: node scripts/build-devices.js --clean --config Release

      - name: Build MCU adapters
        run: node scripts/build-mcu-adapters.js --clean --config Release

      - name: Run extension tests
        run: npm --prefix extension test

      - name: Run core tests
        run: node scripts/test-core.js --config Release

      - name: Package release artifacts
        run: node scripts/package-release.js

      - name: Verify Windows TAP and gateway payload
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $root = "dist/staging/win32-x64/windows-bootstrapper"
          $required = @(
            "$root/tap-windows6/amd64/OemVista.inf",
            "$root/tap-windows6/amd64/tap0901.cat",
            "$root/tap-windows6/amd64/tap0901.sys",
            "$root/tap-windows6/tap-windows6-9.27.0-source.zip",
            "$root/network-gateway.exe"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) { throw "Payload ausente: $path" }
          }
          if (-not (Get-ChildItem "dist/release/win32-x64/*-setup.exe")) { throw "Instalador Windows ausente" }
          $driverSignature = Get-AuthenticodeSignature "$root/tap-windows6/amd64/tap0901.sys"
          if ($driverSignature.Status -ne "Valid") { throw "Assinatura TAP inválida: $($driverSignature.Status)" }
          & "$root/gateway-publish/LasecSimul.NetworkGateway.exe" --self-test
          if ($LASTEXITCODE -ne 0) { throw "Self-test do gateway falhou" }
          $setup = Get-ChildItem "dist/release/win32-x64/*-setup.exe" | Select-Object -First 1
          & $setup.FullName --verify-payload
          if ($LASTEXITCODE -ne 0) { throw "Verificação do payload embutido falhou" }
          & $setup.FullName --machine-status
          if ($LASTEXITCODE -notin @(0, 2)) { throw "Verificação read-only do estado da máquina falhou com $LASTEXITCODE" }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lasecsimul-${{ matrix.target }}
          path: dist/release/${{ matrix.target }}
          if-no-files-found: error

  release:
    name: Tag and Release
    needs: package
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lasecsimul-*
          path: artifacts

      - name: Create Git Tag
        if: ${{ inputs.tag_repository }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Publish Release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "LasecSimul ${{ inputs.version }}"
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
